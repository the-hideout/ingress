x-logging: &default-logging
  driver: json-file
  options:
    max-size: "100m"
    max-file: "5"

services:
  caddy:
    container_name: caddy
    restart: unless-stopped
    logging: *default-logging
    build:
      context: ./src/caddy
      dockerfile: ./Dockerfile
    env_file:
      - src/caddy/creds.env
    ports:
      - 80:80
      - 443:443
      - 8443:8443
    volumes:
      - ./data/caddy_data:/data
      - ./data/caddy_config:/config
    networks:
      - ingress

networks:
  ingress:
    name: ingress
    external: true
